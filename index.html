        statusDisplay.textContent = '⚠️ 保存する録音データがありません。';
        return;
      }

      const groupValue = groupSelect.value.trim();
      const nicknameValue = nicknameInput.value.trim();

      if (!groupValue || !nicknameValue) {
        statusDisplay.textContent = '⚠️ グループとニックネームを入力してください。';

        const reader = new FileReader();
        reader.onloadend = async () => {
          const audioDataUrl = reader.result; // Base64データ
          const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
          const safeNickname = nicknameValue.replace(/[\s\\\/:\*\?"<>\|]/g, '_');
          const baseFileName = `グループ${groupValue}_${safeNickname}_recording-${timestamp}`;

          // --- API送信処理 ---
          const payload = {
            audioDataUrl: audioDataUrl,
            baseFileName: baseFileName
          };

          try {
            const response = await fetch(API_URL, {
              method: "POST",
              mode: "no-cors", // GASへのクロスドメイン送信でよく使われる設定
              body: JSON.stringify(payload)
            });

            // mode: "no-cors" の場合、レスポンスの中身は読めませんが、
            // 送信自体が成功すればここに来ます。
            statusDisplay.textContent = '🎉 送信完了！(ドライブを確認してください)';
            statusDisplay.className = 'success';

          } catch (fetchError) {
            console.error('Fetch Error:', fetchError);
            statusDisplay.textContent = `❌ 送信エラーが発生しました。`;
          } finally {
            recordButton.disabled = false;
            groupSelect.disabled = false;
            nicknameInput.disabled = false;
          }
        };
        reader.readAsDataURL(mp3Blob);
      } catch (error) {
        console.error("エラー:", error);
        statusDisplay.textContent = `❌ エラー: ${error.message}`;
        saveButton.disabled = false;
      }
